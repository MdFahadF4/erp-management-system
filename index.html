<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/mobile.css">
</head>
<body class="bg-gray-100 font-sans text-gray-900 flex h-screen overflow-hidden relative">

  <div id="login-screen" class="absolute inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-2xl">
      <h2 class="text-3xl font-extrabold mb-2 text-center text-gray-800">System Gateway</h2>
      <p class="text-sm text-center text-gray-500 mb-6">Please input authorization credentials.</p>
      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Username</label>
          <input type="text" id="login-username" required class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="login-password" required class="w-full border rounded-lg p-3 pr-12 focus:ring-2 focus:ring-blue-500 outline-none">
            <button type="button" id="toggle-password" class="absolute right-3 top-3.5 text-xs font-bold uppercase text-gray-400 hover:text-blue-600 transition tracking-wider focus:outline-none">Show</button>
          </div>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-semibold p-3 rounded-lg hover:bg-blue-700 transition">Sign In</button>
      </form>
    </div>
  </div>

  <div id="sidebar-backdrop" class="fixed inset-0 bg-slate-900/50 z-40 hidden backdrop-blur-sm transition-opacity cursor-pointer"></div>

  <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-800 text-white flex flex-col h-full shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out">
    <div class="p-5 text-xl font-black tracking-wider border-b border-slate-700 flex justify-between items-center">
      <span>CORE PANEL</span>
      <button id="close-sidebar" class="text-2xl text-slate-400 hover:text-white transition focus:outline-none">&times;</button>
    </div>
    <nav class="flex-1 overflow-y-auto p-4 space-y-1">
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition" data-target="dashboard">Dashboard</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition" data-target="hr">HR Management</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition hidden" id="nav-hr-transactions" data-target="hr_transactions">HR Transactions</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition" data-target="customers">Customers</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition hidden" id="nav-customer-transactions" data-target="customer_transactions">Customer Transactions</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium text-emerald-400 transition hidden" id="nav-internal-transfer" data-target="internal_transfer">Internal Transfer</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition hidden" id="nav-suppliers" data-target="suppliers">Suppliers</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition hidden" id="nav-supplier-transactions" data-target="supplier_transactions">Supplier Transactions</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition hidden" id="nav-expense-heads" data-target="expense_heads">Expense Heads</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition hidden" id="nav-expense-transactions" data-target="expense_transactions">Expense Transactions</button>
      
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium text-orange-400 transition hidden" data-target="creditors">Creditor Heads</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium text-orange-400 transition hidden" data-target="creditor_transactions">Creditor Transactions</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium text-blue-400 transition hidden" data-target="income_heads">Income Heads</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium text-blue-400 transition hidden" data-target="income_transactions">Income Transactions</button>

      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-bold text-slate-100 transition hidden" data-target="all_transactions">All Transaction View</button>
      <button class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-medium transition" data-target="reports">Reports System</button>
      <button id="nav-users" class="menu-btn w-full text-left p-3 rounded-lg hover:bg-slate-700 font-semibold text-yellow-400 transition hidden" data-target="users">User Access Control</button>
    </nav>
    <div class="p-4 border-t border-slate-700 space-y-2">
      <button id="btn-open-password-modal" class="w-full bg-slate-700 hover:bg-slate-600 font-medium p-2 rounded-lg transition text-center text-sm text-white shadow-sm">Change Password</button>
      <button id="btn-logout" class="w-full bg-red-600 hover:bg-red-700 font-medium p-2.5 rounded-lg transition text-center text-white shadow-sm">Sign Out</button>
    </div>
  </aside>

  <div id="app-shell" class="flex-1 flex flex-col h-full w-full overflow-hidden">
    <header id="app-header" class="fixed top-0 left-0 right-0 z-[60] bg-white shadow-sm px-2 py-2 md:sticky md:left-auto md:right-auto md:z-50 md:p-4 flex justify-between items-center gap-2 border-b shrink-0">
      <div class="flex items-center min-w-0">
        <button id="open-sidebar" class="p-1.5 md:p-2 mr-1 md:mr-4 text-slate-700 hover:text-blue-600 hover:bg-blue-50 rounded-lg focus:outline-none transition shrink-0">
          <svg class="w-6 h-6 md:w-7 md:h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <h1 class="text-sm md:text-xl font-bold text-slate-800 truncate">System Workspace</h1>
      </div>
      
      <div class="flex items-center gap-1.5 md:gap-4 shrink-0">
        
        <div id="user-profile-badge" class="hidden flex-col text-right leading-tight">
          <span id="header-username" class="text-[11px] md:text-sm font-extrabold text-slate-800 capitalize tracking-wide max-w-[72px] md:max-w-none truncate"></span>
          <span id="header-role" class="text-[8px] md:text-[10px] font-bold text-blue-600 uppercase tracking-wider truncate"></span>
        </div>

        <div id="user-cash-drawer-badge" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-700 text-[10px] md:text-xs font-bold px-2 py-1 md:px-3 md:py-1.5 rounded-lg font-mono shadow-sm whitespace-nowrap">
          <span class="hidden sm:inline">Cash Drawer: </span>SAR <span id="header-user-balance">0.00</span>
        </div>
      </div>
    </header>

    <div id="app-body" class="flex flex-col flex-1 min-h-0 overflow-hidden md:pt-0">
    <div id="dashboard-insights-panel" class="hidden shrink-0 border-b border-gray-200 bg-gray-50/80 z-[55]">
      <button id="dashboard-insights-toggle" type="button" class="md:hidden w-full flex items-center justify-between gap-2 px-3 py-2.5 text-left bg-white hover:bg-gray-50 transition" aria-expanded="false" aria-controls="dashboard-insights-body">
        <div class="min-w-0">
          <div class="text-[10px] font-bold text-gray-500 uppercase tracking-wider">Dashboard Snapshot</div>
          <div id="insights-toggle-summary" class="text-xs text-gray-600 truncate">Tap to view balance &amp; cash drawers</div>
        </div>
        <svg id="insights-toggle-chevron" class="w-5 h-5 text-gray-400 shrink-0 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
      </button>

      <div id="dashboard-insights-body" class="hidden md:block px-3 md:px-6 py-2 md:py-3 max-h-[38vh] md:max-h-none overflow-y-auto md:overflow-visible space-y-2 md:space-y-3">
        <div id="admin-global-balance-container" class="empty:hidden"></div>

        <div id="dash-user-drawers-section">
          <div class="flex items-center justify-between gap-2 mb-1.5 md:mb-2">
            <h3 class="text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-wider">Live User Cash Drawers</h3>
          </div>
          <div id="dash-user-drawers" class="flex gap-2 overflow-x-auto pb-1 md:grid md:grid-cols-3 lg:grid-cols-4 md:gap-3 md:overflow-visible snap-x snap-mandatory">
            <div class="snap-start shrink-0 w-full md:w-auto col-span-full p-3 text-center text-blue-500 text-xs font-bold animate-pulse">Calculating enterprise drawer balances...</div>
          </div>
        </div>
      </div>
    </div>

    <div id="erp-module-toolbar" class="hidden shrink-0 border-b border-gray-200 bg-gray-50/80 z-[55] md:hidden"></div>

    <main id="main-content" class="flex-1 p-3 md:p-8 overflow-y-auto min-h-0">
    </main>
    </div>
  </div>

  <div id="modal-change-password" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[150] flex items-center justify-center p-4 hidden">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm p-6 border border-gray-100">
      <div class="flex justify-between items-center border-b pb-3 mb-4">
        <h3 class="text-lg font-bold text-gray-800">Update Credentials</h3>
        <button id="close-password-modal" class="text-2xl font-bold text-gray-400 hover:text-gray-700 focus:outline-none">&times;</button>
      </div>
      <form id="form-change-password" class="space-y-4">
        
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Current Password</label>
          <div class="relative">
            <input type="password" id="cp-old" required class="w-full border rounded-lg p-2 pr-12 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" id="toggle-cp-old" class="absolute right-3 top-2.5 text-[10px] font-bold uppercase text-gray-400 hover:text-blue-600 transition tracking-wider focus:outline-none">Show</button>
          </div>
        </div>
        
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">New Password</label>
          <div class="relative">
            <input type="password" id="cp-new" required minlength="6" class="w-full border rounded-lg p-2 pr-12 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" id="toggle-cp-new" class="absolute right-3 top-2.5 text-[10px] font-bold uppercase text-gray-400 hover:text-blue-600 transition tracking-wider focus:outline-none">Show</button>
          </div>
        </div>
        
        <div>
          <label class="block text-xs font-bold uppercase text-gray-600 mb-1">Confirm New Password</label>
          <div class="relative">
            <input type="password" id="cp-confirm" required minlength="6" class="w-full border rounded-lg p-2 pr-12 text-sm outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" id="toggle-cp-confirm" class="absolute right-3 top-2.5 text-[10px] font-bold uppercase text-gray-400 hover:text-blue-600 transition tracking-wider focus:outline-none">Show</button>
          </div>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold p-2.5 rounded text-sm transition tracking-wider mt-2 shadow-md">OVERWRITE PASSWORD</button>
      </form>
    </div>
  </div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
